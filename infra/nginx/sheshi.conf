limit_req_zone $binary_remote_addr zone=api_reads:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api_auth:10m rate=2r/s;
limit_conn_zone $binary_remote_addr zone=addr:10m;

upstream sheshi_api {
    # Single instance on purpose: presence tracking, SignalR groups, and the
    # ./uploads directory are all process-local. Scaling out requires a
    # SignalR backplane (e.g. Redis), shared upload storage, and sticky sessions.
    server api:5080 max_fails=3 fail_timeout=15s;
    keepalive 64;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 6m;
    limit_conn addr 40;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;

    location = /health {
        proxy_pass http://sheshi_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /hub {
        limit_req zone=api_reads burst=30 nodelay;
        proxy_pass http://sheshi_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 75s;
    }

    location /api/auth/ {
        limit_req zone=api_auth burst=10 nodelay;
        proxy_pass http://sheshi_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        limit_req zone=api_reads burst=60 nodelay;
        proxy_pass http://sheshi_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
