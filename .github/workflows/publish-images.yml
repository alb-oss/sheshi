name: publish-images

on:
  workflow_run:
    workflows: [ci]
    branches: [main]
    types: [completed]

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

env:
  REGISTRY: ghcr.io
  WEB_IMAGE: ghcr.io/alb-oss/sheshi-web
  API_IMAGE: ghcr.io/alb-oss/sheshi-api

jobs:
  publish:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: build-web
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:${{ github.event.workflow_run.head_sha }}
            ${{ env.WEB_IMAGE }}:main

      - uses: actions/attest@281a49d4cbb0a72c9575a50d18f6deb515a11deb
        with:
          subject-name: ${{ env.WEB_IMAGE }}
          subject-digest: ${{ steps.build-web.outputs.digest }}
          push-to-registry: true

      - id: build-api
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: server/Sheshi.Api/Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}:${{ github.event.workflow_run.head_sha }}
            ${{ env.API_IMAGE }}:main

      - uses: actions/attest@281a49d4cbb0a72c9575a50d18f6deb515a11deb
        with:
          subject-name: ${{ env.API_IMAGE }}
          subject-digest: ${{ steps.build-api.outputs.digest }}
          push-to-registry: true
