name: deploy-production

on:
  workflow_run:
    workflows: [publish-images]
    branches: [main]
    types: [completed]

permissions:
  contents: read
  packages: read

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-24.04
    environment:
      name: production
      url: https://sheshi.live
    steps:
      - name: Prepare SSH key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.PROD_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          printf '%s\n' "${{ secrets.PROD_SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 700 ~/.ssh
          chmod 600 ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy commit image
        env:
          DEPLOY_SHA: ${{ github.event.workflow_run.head_sha }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [[ ! "$DEPLOY_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Invalid deploy SHA: $DEPLOY_SHA" >&2
            exit 1
          fi
          {
            printf '%s\n' "$GHCR_USERNAME"
            printf '%s\n' "$GHCR_TOKEN"
          } | ssh -i ~/.ssh/id_ed25519 \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -p "${{ secrets.PROD_SSH_PORT || '22' }}" \
            "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}" \
            "/opt/sheshi/scripts/deploy.sh '$DEPLOY_SHA'"
